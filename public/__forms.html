<!--
  Static form definition for Netlify Forms detection.
  @netlify/plugin-nextjs@5 no longer scans rendered Next.js output for the
  data-netlify attribute, so the form must be declared in a static HTML file
  in /public for the build-time bot to register it. The React ContactForm
  component submits to this endpoint via fetch. Do not delete.
  See: https://ntl.fyi/next-runtime-forms-migration
-->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Netlify Form Definitions</title>
  </head>
  <body>
    <form name="contact" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="contact" />
      <input type="text" name="name" />
      <input type="text" name="business" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <textarea name="message"></textarea>
      <input name="bot-field" />
    </form>
  </body>
</html>
